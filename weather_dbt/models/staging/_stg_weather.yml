version: 2

models:
  - name: stg_weather
    description: "Bảng staging làm sạch và chuẩn hoá dữ liệu từ Weather_Data, loại bỏ bản ghi trùng"
    columns:
      - name: city_name
        tests:
          - not_null

      - name: extracted_at
        tests:
          - not_null

      - name: temperature_c
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: -50
              max_value: 60

      - name: humidity_pct
        tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 100

      - name: weather_main
        tests:
          - not_null

    tests:
      - dbt_utils.unique_combination_of_columns:
          combination_of_columns:
            - city_name
            - extracted_at
